      # --- Create DMG ---
      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R gruepr.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "gruepr" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            gruepr.dmg

