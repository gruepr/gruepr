name: Build macOS

on: workflow_dispatch

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.1'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtcharts qtnetworkauth'
          cache: true

      - name: Build universal libomp
        run: |
          brew install cmake
          git clone --depth 1 --branch llvmorg-18.1.8 https://github.com/llvm/llvm-project.git
          cmake -S llvm-project/openmp -B libomp-build \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PWD/libomp-universal
          cmake --build libomp-build --parallel $(sysctl -n hw.ncpu)
          cmake --install libomp-build

      - name: Create secrets defines
        run: |
          cat > ci_secrets.pri << 'EOF'
          DEFINES += GITHUB_SECRETS
          DEFINES += SECRET_GOOGLE_CLIENT_ID=\\\"${{ secrets.SECRET_GOOGLE_CLIENT_ID }}\\\"
          DEFINES += SECRET_GOOGLE_CLIENT_SECRET=\\\"${{ secrets.SECRET_GOOGLE_CLIENT_SECRET }}\\\"
          EOF

      # --- Build ARM ---
      - name: Build ARM
        run: |
          qmake gruepr.pro CONFIG+=release CONFIG-=only_active_arch \
            "OMP_PREFIX=$PWD/libomp-universal" "QMAKE_APPLE_DEVICE_ARCHS=arm64"
          make -j$(sysctl -n hw.ncpu)
          file gruepr.app/Contents/MacOS/gruepr
          cp gruepr.app/Contents/MacOS/gruepr gruepr-arm64
          make clean

      # --- Build Intel ---
      - name: Build Intel
        run: |
          qmake gruepr.pro CONFIG+=release CONFIG-=only_active_arch \
            "OMP_PREFIX=$PWD/libomp-universal" "QMAKE_APPLE_DEVICE_ARCHS=x86_64"
          make -j$(sysctl -n hw.ncpu)
          file gruepr.app/Contents/MacOS/gruepr
          cp gruepr.app/Contents/MacOS/gruepr gruepr-x86_64

      # --- Create universal binary ---
      - name: Create universal binary
        run: |
          lipo -create gruepr-arm64 gruepr-x86_64 -output gruepr.app/Contents/MacOS/gruepr
          lipo -info gruepr.app/Contents/MacOS/gruepr

      # --- Deploy Qt frameworks ---
      - name: Deploy Qt
        run: macdeployqt gruepr.app

      # --- Copy universal libomp into app bundle ---
      - name: Bundle libomp
        run: |
          cp libomp-universal/lib/libomp.dylib gruepr.app/Contents/Frameworks/
          install_name_tool -change @rpath/libomp.dylib @executable_path/../Frameworks/libomp.dylib gruepr.app/Contents/MacOS/gruepr

